<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Typing Game Auto Level</title>
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Moul&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Kantumruy Pro', sans-serif;
}

body{
    font-family:"Kantumruy Pro",sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#959cbe,#4b4254);
    overflow:hidden;
}

.game-container{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding:20px;
}

h1{
    font-family:"Moul",cursive;
    font-size:55px;
    margin-bottom:10px;
}

.subtitle{
    font-size:20px;
    margin-bottom:25px;
}

.level-buttons-container{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.level-btn{
    padding:10px 20px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.level-btn:hover{
    transform:translateY(-3px);
}

.level-btn.active{
    background:#fdcb6e;
    color:#2d3436;
}

.score-display{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

.word-display{
    width:80%;
    max-width:900px;
    min-height:120px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
    font-size:40px;
    margin-bottom:25px;
    word-break:break-word;
}

.current-char{
    color:#fdcb6e;
    font-weight:bold;
    text-decoration:underline;
}

.input-field{
    width:70%;
    max-width:700px;
    padding:18px;
    border:none;
    border-radius:50px;
    font-size:28px;
    text-align:center;
    outline:none;
    transition:.2s;
}

.input-field:focus{
    transform:scale(1.03);
}

.input-field.error-flash{
    background:#ff7675;
    color:white;
    box-shadow:0 0 20px rgba(255,0,0,.7);
}

.message{
    margin-top:20px;
    height:40px;
    font-size:28px;
    font-weight:bold;
    color:#ffeaa7;
}

.progress{
    margin-top:10px;
    font-size:18px;
}


</style>
</head>

<body>
<div class="game-container">
    <h1>🎮 Typing Game</h1>
    <p class="subtitle"> វាយអក្សរឱ្យបានត្រឹមត្រូវ ដើម្បីឡើង Level</p>

    <div class="level-buttons-container">
        <button class="level-btn active" data-level="1">Level 1</button>
        <button class="level-btn" data-level="2">Level 2</button> 
        <button class="level-btn" data-level="3">Level 3</button>
        <button class="level-btn" data-level="4">Level 4</button>
    </div>

    <div class="score-display">⭐ Score :<span id="score">0</span></div>

    <div class="progress"> Words Completed :<span id="completedWords">0</span>/5
    </div>
    <br>
    <div class="word-display" id="wordDisplay">Loading...</div>
    <input type="text" id="wordInput" class="input-field" placeholder="វាយអក្សរនៅទីនេះ..." autocomplete="off" autofocus>
    <div class="message" id="message"></div>

</div>

<script>
const levelsData = {
    1:["cat","dog","fish","bird","book","tree","star","home"],
    2:["apple","banana","orange","window","coding","nature","school"],
    3:["javascript","developer","beautiful","wonderful","successful"],
    4:["Practice makes perfect.","HTML CSS and JavaScript.","Keep moving forward.","Never give up on your dreams."]
};


let currentLevel = 1;
let score = 0;
let currentText = "";
let remainingText = "";
let completedWords = 0;
const wordsToNextLevel = 5;

function updateDisplay(){
    if(remainingText.length > 0){
        $('#wordDisplay').html(
            `<span class="current-char">${remainingText[0]}</span>${remainingText.substring(1)}`
        );
    }else{
        $('#wordDisplay').html("");
    }
}
function initWord(){
    const words = levelsData[currentLevel];
    const randomIndex =Math.floor(Math.random() * words.length);
    currentText = words[randomIndex];
    remainingText = currentText;
    updateDisplay();
}

function finishWord(){
    completedWords++;FESOPT34
    $('#completedWords').text(completedWords);
    $('#message').text("🎉 ពូកែណាស់!");
    if(completedWords >= wordsToNextLevel){
        if(currentLevel < 4){
            currentLevel++;
            completedWords = 0;
            $('#completedWords').text(completedWords);
            $('.level-btn').removeClass('active');
            $(`.level-btn[data-level="${currentLevel}"]`).addClass('active');
            $('#message').text(`🚀 Level ${currentLevel} Started!`);

        }else{

            $('#message').text("🏆 អបអរសាទរ! អ្នកបានបញ្ចប់គ្រប់ Level!");
            $('#wordInput').prop("disabled",true);
            return;
        }
    }
    setTimeout(function(){
        $('#message').text("");
        initWord();
    },800);
}

$(document).ready(function(){
    initWord();
    $('.level-btn').click(function(){
        $('.level-btn').removeClass('active');
        $(this).addClass('active');
        currentLevel = $(this).data('level');
        score = 0;
        completedWords = 0;
        $('#score').text(score);
        $('#completedWords').text(completedWords);
        $('#message').text("");
        $('#wordInput')
            .val("")
            .removeClass('error-flash')
            .prop("disabled",false)
            .focus();
        initWord();
    });

    $('#wordInput').on('input',function(){
        const inputValue = $(this).val();
        if(inputValue === ""){
            $(this).removeClass('error-flash');
            return;
        }
        if(inputValue === remainingText[0]){
            $(this).removeClass('error-flash');
            remainingText =
                remainingText.substring(1);
            score++;
            $('#score').text(score);
            $(this).val("");
            updateDisplay();
            if(remainingText.length === 0){
                finishWord();
            }
        }
        else{
            $(this).addClass('error-flash').val("");
        }
    });

});

</script>

</body>
</html>
